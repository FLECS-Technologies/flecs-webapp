<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FLECS</title>
    <link rel="manifest" href="/manifest.json" />
    <!-- The favicon is a white-label file served from theming/; it's linked at
         runtime in main.tsx (against the mount prefix), not statically here. -->
    <!-- Synchronous theme init: applies .dark before first paint to prevent FOUC -->
    <script>
      (function () {
        var t = localStorage.getItem('preferred-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (t == null && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
