# Extract the basename of the request URI so files resolve regardless of the
# (variable) path prefix the reverse proxy mounts us under, e.g. /ui/foo.js.
# URIs with no trailing segment (/, /ui/, ...) are HTML entry points, so the
# default routes them to the SPA shell rather than an empty try_files token.
#
# `volatile` is REQUIRED: map results are cached per-request by default, but the
# SPA fallback below re-enters this location via an internal redirect to
# /index.html. Without volatile, $filename keeps its first value (e.g. "logo.svg"
# or a client-side route like "apps"), so try_files never matches index.html and
# redirects to /index.html again - an internal redirection cycle that nginx
# aborts with HTTP 500. volatile forces $filename to recompute to "index.html"
# after the redirect, letting the shell be served. Any path whose basename is not
# an on-disk file (missing logo, deep-linked SPA route on refresh) hit this.
map $uri $filename {
  volatile;
  default "index.html";
  ~/(?<fname>[^/]+)$ $fname;
}

# Cache policy by path. Vite emits content-hashed files under /assets/ (the hash
# in each filename changes whenever its contents change), so those are immutable
# and safe to cache forever. Everything else - above all the index.html SPA
# shell, plus the runtime-editable config.json/theme.css - MUST be revalidated on
# every navigation. Without this, browsers heuristically cache the shell and keep
# running the previous build's JS after a deploy until a hard reload; a single
# sign-in can then split across two builds (old signIn + new callback), leaving
# the code_verifier under the old storage key and failing "Missing OAuth verifier".
map $uri $cache_control {
  default   "no-cache";
  ~/assets/ "public, max-age=31536000, immutable";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html/;

    # ── Security headers (WSTG CONF-12, CONF-14) ──────────────────────
    # HSTS is set by the TLS-terminating edge upstream (not here) because this
    # container listens on plain HTTP; sending HSTS over HTTP is ignored.
    #
    # CSP: allow marketplace icons from any HTTPS host (img-src https:), allow
    # TanStack Query devtools / Tailwind v4 injected <style> (style-src
    # 'unsafe-inline'), and cross-origin fetch to the console APIs. The script-src
    # sha256 hash whitelists the synchronous theme-init script inlined in
    # index.html (runs pre-paint to prevent FOUC); regenerate it if that script
    # changes - otherwise the theme flashes and the browser logs a CSP violation.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-OSU+VjvlI1YLJPhnTs4LAe+6yHFf80np21uHKfaA4V0='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://console.flecs.tech https://console-dev.flecs.tech https://staging.flecs.tech; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Cache-Control is derived by path (see the $cache_control map above). It is
    # set here at server scope on purpose: an add_header inside a location block
    # discards ALL inherited add_headers (nginx replaces, never merges), which
    # would silently drop the security headers above for that location.
    add_header Cache-Control $cache_control always;

    location = /health {
        access_log off;
        return 204;
    }

    # Content-hashed build assets: served straight from disk, cached forever
    # (immutable, via the map above). A miss returns 404 rather than falling back
    # to the SPA shell, so a stale shell that references a purged bundle fails
    # cleanly instead of getting HTML the browser cannot execute as a module.
    location ~ /assets/ {
        try_files /assets/$filename =404;
    }

    location / {
        try_files /$filename /assets/$filename /index.html;
    }
}
