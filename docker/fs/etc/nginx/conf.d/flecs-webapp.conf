# Extract the basename of the request URI so files resolve regardless of the
# (variable) path prefix the reverse proxy mounts us under, e.g. /ui/foo.js.
# URIs with no trailing segment (/, /ui/, ...) are HTML entry points, so the
# default routes them to the SPA shell rather than an empty try_files token.
map $uri $filename {
  default "index.html";
  ~/(?<fname>[^/]+)$ $fname;
}

server {
    listen 80;
    server_name _;

    # ── Security headers (WSTG CONF-12, CONF-14) ──────────────────────
    # HSTS is set by the TLS-terminating edge upstream (not here) because this
    # container listens on plain HTTP; sending HSTS over HTTP is ignored.
    #
    # CSP: allow marketplace icons from any HTTPS host (img-src https:), allow
    # TanStack Query devtools / Tailwind v4 injected <style> (style-src
    # 'unsafe-inline'), and cross-origin fetch to the console APIs. The script-src
    # sha256 hash whitelists the synchronous theme-init script inlined in
    # index.html (runs pre-paint to prevent FOUC); regenerate it if that script
    # changes - otherwise the theme flashes and the browser logs a CSP violation.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-OSU+VjvlI1YLJPhnTs4LAe+6yHFf80np21uHKfaA4V0='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://console.flecs.tech https://console-dev.flecs.tech https://staging.flecs.tech; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    location = /health {
        access_log off;
        return 204;
    }

    location / {
        root /usr/share/nginx/html/;
        try_files /$filename /assets/$filename /index.html;
    }
}
