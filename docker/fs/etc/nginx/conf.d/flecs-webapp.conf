map $uri $filename {
  default "";
  ~/(?<fname>[^/]+)$ $fname;
}

server {
    listen 80;
    server_name _;

    # ── Security headers (WSTG CONF-12, CONF-14) ──────────────────────
    # HSTS is set by the TLS-terminating edge upstream (not here) because this
    # container listens on plain HTTP; sending HSTS over HTTP is ignored.
    #
    # CSP: allow marketplace icons from any HTTPS host (img-src https:), allow
    # TanStack Query devtools / Tailwind v4 injected <style> (style-src
    # 'unsafe-inline'), and cross-origin fetch to the console APIs.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://console.flecs.tech https://console-dev.flecs.tech https://staging.flecs.tech; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    location = /health {
        access_log off;
        return 204;
    }

    location / {
        root /usr/share/nginx/html/;
        try_files $uri /assets/$filename /index.html;
    }
}
